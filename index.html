<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
<link rel="stylesheet" href="css/biblioteca.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230d0b18'/%3E%3Ctext x='50' y='68' font-size='60' text-anchor='middle' fill='%238b7cf8' font-family='monospace'%3EB%3C/text%3E%3C/svg%3E">
<title>Biblioteca</title>
</head>
<body>
<div id="wrap">

  <header id="topbar">
    <div>
      <div class="logo-name">B<span class="logo-dot">.</span>I<span class="logo-dot">.</span>B<span class="logo-dot">.</span></div>
      <div class="logo-sub">SKILLS &amp; TOOLS LIBRARY</div>
    </div>
    <div class="status-bar">
      <span><span class="sdot sdot-g"></span>INDEX · <span id="hdr-index-status">LOADING</span></span>
      <span><span class="sdot sdot-p"></span>GROQ · <span id="hdr-groq-status">CHECKING</span></span>
    </div>
  </header>

  <main id="maingrid">
    <div id="left-col">
      <section class="panel" id="graph-panel">
        <div class="ph">
          <span class="ph-title"><span class="ph-dot"></span>SKILLS GRAPH</span>
          <span class="ph-meta" id="graph-meta">0 NODES</span>
        </div>
        <div class="pb">
          <div id="graph-controls">
            <input id="filter-box" placeholder="FILTER NODES…" autocomplete="off" aria-label="Filter graph nodes">
            <select id="plugin-filter" aria-label="Filter by plugin">
              <option value="">ALL PLUGINS</option>
            </select>
            <div id="source-filter" role="group" aria-label="Filter by source type">
              <label><input type="checkbox" data-source="skill" checked>SKILL</label>
              <label><input type="checkbox" data-source="agent" checked>AGENT</label>
              <label><input type="checkbox" data-source="command" checked>CMD</label>
              <label><input type="checkbox" data-source="plugin" checked>PLUGIN</label>
              <label><input type="checkbox" data-source="mcp-tool" checked>MCP</label>
            </div>
          </div>
          <div id="graph-canvas"></div>
          <div id="graph-empty" style="display:none">NO ENTRIES IN data/skills-index.json<br>RUN rescan.py TO GENERATE ONE</div>
        </div>
      </section>
    </div>

    <div id="right-col">
      <section class="panel" id="task-panel">
        <div class="ph">
          <span class="ph-title"><span class="ph-dot"></span>TASK RECOMMENDER</span>
          <span class="ph-meta">GROQ · LLAMA-3.1-8B</span>
        </div>
        <div class="pb">
          <textarea id="task-input" placeholder="Describe a task, e.g. &quot;review this pull request for bugs&quot;…" aria-label="Task description"></textarea>
          <button id="task-submit" type="button">RECOMMEND</button>
          <div id="task-status" role="status" aria-live="polite"></div>
          <div id="reasoning-box" style="display:none"></div>
        </div>
      </section>

      <section class="panel" id="health-panel">
        <div class="ph">
          <span class="ph-title"><span class="ph-dot"></span>SESSION HEALTH</span>
          <span class="ph-meta" id="health-meta">SNAPSHOT</span>
        </div>
        <div class="pb" id="health-body"></div>
      </section>
    </div>
  </main>

</div>

<script src="config.local.js" onerror="window.BIBLIOTECA_CONFIG_MISSING=true"></script>
<script src="js/graph.js"></script>
<script src="js/recommend.js"></script>
<script src="js/session-health.js"></script>
</body>
</html>
